{% extends "layouts/base-auth.html" %}
{% load static %}

{% block content %}

  <main class="main-content  mt-0">
    <section>
      <div class="page-header min-vh-100">
        <div class="container">
          <div class="row">
            <div class="col-xl-4 col-lg-5 col-md-7 d-flex flex-column mx-lg-0 mx-auto">
              <div class="card card-plain mb-3">
                <div class="card-header pb-0 text-start">
                  <h4 class="font-weight-bolder">Password Changed</h4>
                  <p class="mb-0">Your password has been changed successfully!</p>
                </div>
                <div class="card-footer ">
                  <p class="mb-4 text-sm mx-auto">
                    Login again
                    <a href="{% url "login" %}" class="text-primary text-gradient font-weight-bold">Sign in</a>
                  </p>
                </div>
              </div>
            </div>
            {% include "includes/auth-side-panel.html" %}
          </div>
        </div>
      </div>
    </section>
  </main>

{% endblock content %}
